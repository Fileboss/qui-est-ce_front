<div class="min-h-screen flex flex-col">
  <header class="flex items-center justify-between px-6 py-3 bg-white border-b border-gray-200 shadow-sm">
    <span class="text-sm text-gray-600">Connecté en tant que <strong>{{ auth.username() }}</strong></span>
    <button
      (click)="auth.logout()"
      class="text-sm px-3 py-1.5 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 transition-colors"
    >
      Se déconnecter
    </button>
  </header>
  <main class="flex-1">
    <router-outlet />
  </main>
</div>
