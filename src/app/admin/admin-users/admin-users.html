<div class="min-h-screen bg-gray-50">
  <div class="max-w-2xl mx-auto px-4 py-8">

    <div class="flex items-center gap-4 mb-8">
      <a routerLink="/" class="text-blue-600 hover:underline text-sm">← Retour</a>
      <h1 class="text-2xl font-bold text-gray-800">Administration des utilisateurs</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 px-6 py-6">
      <h2 class="text-sm font-semibold text-gray-600 mb-4">Créer un utilisateur</h2>

      <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Nom d'utilisateur (3–30 caractères)</label>
          <input
            type="text"
            [value]="username()"
            (input)="onUsernameChange($event)"
            placeholder="ex : alice"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Mot de passe (12 caractères minimum)</label>
          <input
            type="password"
            [value]="password()"
            (input)="onPasswordChange($event)"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Rôle</label>
          <select
            [value]="role()"
            (change)="onRoleChange($event)"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="player">Joueur</option>
            <option value="admin">Administrateur</option>
          </select>
        </div>

        <button
          (click)="createUser()"
          [disabled]="!canSubmit()"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed self-start"
        >
          {{ submitting() ? 'Création…' : "Créer l'utilisateur" }}
        </button>
      </div>

      @if (error()) {
        <p class="text-red-600 text-sm mt-4">{{ error() }}</p>
      }

      @if (success()) {
        <p class="text-green-600 text-sm mt-4">Utilisateur créé avec succès.</p>
      }
    </div>

  </div>
</div>
